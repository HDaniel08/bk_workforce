services:
  postgres:
    image: postgres:16
    container_name: bk-workforce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bk_workforce
    ports:
      - "5432:5432"
    volumes:
      - bk_workforce_postgres_data:/var/lib/postgresql/data

volumes:
  bk_workforce_postgres_data: