[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@9.15.0", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @bk-workforce/api prisma:generate",
  "pnpm --filter @bk-workforce/api build"
]

[start]
cmd = "pnpm --filter @bk-workforce/api start"
